<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 6</title>
</head>
<body>
   <form>
    <fieldset>
        <legend>Personal Information</legend>
    <label for="firstname">First name:</label><br>
    <input type="text" id="firstname" name="firstname" value="John"><br>
    <label for="lastname">Last name:</label><br>
    <input type="text" id="lastname" name="lastname"><br>
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required><br>
    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password"><br>
    <label>Gender:</label><br>
    <label for="male">Male</label>
    <input type="radio" id="male" name="gender"><br>
    <label for="female">Female</label>
    <input type="radio" id="female" name="gender"><br><br>
    <label>Hobbies</label><br>
    <input type="checkbox" id="gaming" name="gaming" value="Gaming">
    <label for="gaming">Gaming</label><br>
    <input type="checkbox" id="football" name="football" value="Football">
    <label for="football">Football</label><br>
    <input type="checkbox" id="swimming" name="swimming" value="Swimming">
    <label for="swimming">Swimming</label><br>
    <label for="pets">Choose a pet:</label>
    <select id="pet" name="pet">
        <option value="Dog">Dog</option>
        <option value="Cat">Cat</option>
        <option value="parrot">Parrot</option>
    </select><br><br>

    <textarea name="message" rows="10" col="20" maxlength="50"></textarea><br><br>
    <input type="text" id="firstname" name="firstname" value="John" readonly><br><br>
    <input type="text" id="firstname" name="firstname" value="John" disabled><br><br>
    <input type="submit" id="submit" name="submit">
     </fieldset>
   </form> 
   
</body>
</html>
